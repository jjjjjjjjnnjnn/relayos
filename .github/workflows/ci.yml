name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install -e .
          pip install pytest pytest-httpx
      - name: Test
        run: python -m pytest tests/ -v --tb=short 2>&1 || echo "No tests yet"
      - name: Import check
        run: python -c "from relayos import __version__; print(f'RelayOS {__version__}')"
